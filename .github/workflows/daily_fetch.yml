name: Daily Facebook Fetch

on:
  workflow_dispatch:
  schedule:
    - cron: '10 1 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily fetch
        run: |
          python3 fetch_facebook_posts.py 'https://www.facebook.com/dextermchang' --count 20

      - name: Commit new posts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'data/大會計師 張明輝' .github/workflows/daily_fetch.yml fetch_facebook_posts.py README.md
          if git diff --cached --quiet; then
            echo 'No new posts.'
            exit 0
          fi
          git commit -m 'Daily fetch: add new Facebook posts'
          git push origin HEAD:main
