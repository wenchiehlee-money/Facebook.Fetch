name: Daily Facebook Fetch

on:
  workflow_dispatch:
    inputs:
      months_back:
        description: '回溯月數（0 = 僅抓最新；1 = 抓近 30 天，用於補資料）'
        required: false
        default: '0'
  schedule:
    - cron: '10 1 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE_MONEY1 }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily fetch pipeline
        env:
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
          FB_DTSG: ${{ secrets.FB_DTSG }}
          GH_TOKEN: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE_MONEY1 }}
        run: |
          python3 scripts/run_daily_fetch.py \
            --months-back "${{ github.event.inputs.months_back || '0' }}" \
            --commit --trigger-sync --create-issue
