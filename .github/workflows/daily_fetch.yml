name: Daily Facebook Fetch

on:
  workflow_dispatch:
  schedule:
    - cron: '10 1 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Reset new post counts
        run: |
          # Reset new_post_count to 0 in all summary files to avoid false positives from previous commits
          python3 -c "import json, glob; [json.dump({**json.load(open(f, encoding='utf-8')), 'new_post_count': 0}, open(f, 'w', encoding='utf-8'), ensure_ascii=False, indent=2) for f in glob.glob('data/*/latest_fetch_summary.json')]"

      - name: Run daily fetch
        env:
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
        run: |
          # Read URLs from data/fetch_urls.txt
          # Format: URL [TAB page_name]  — page_name is used as folder name override
          while IFS=$'\t' read -r url page_name; do
            [[ "$url" =~ ^#.*$ || -z "$url" ]] && continue
            echo "::group::Fetching $url"
            if [[ -n "$page_name" ]]; then
              python3 fetch_facebook_posts.py "$url" --count 20 --cookie "$FB_COOKIE" --page-name "$page_name" || echo "Warning: Failed to fetch $url"
            else
              python3 fetch_facebook_posts.py "$url" --count 20 --cookie "$FB_COOKIE" || echo "Warning: Failed to fetch $url"
            fi
            echo "::endgroup::"
          done < data/fetch_urls.txt

      - name: Fetch saved lists
        env:
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
        run: |
          # Saved lists require login cookie — fetches first page (10 items) reliably
          # Pagination is browser-only; daily run catches newly saved items at top of list
          saved_lists=(
            "https://www.facebook.com/saved/?list_id=10222174769398438&referrer=SAVE_DASHBOARD_NAVIGATION_PANEL"
          )
          for url in "${saved_lists[@]}"; do
            echo "::group::Fetching saved list $url"
            python3 fetch_saved_list.py "$url" --cookie "$FB_COOKIE" || echo "Warning: Failed to fetch saved list $url"
            echo "::endgroup::"
          done

      - name: Rebuild README
        run: |
          python3 -c "
import sys, re
from pathlib import Path
from datetime import datetime, timezone, timedelta

data_dir = Path('data')

def build_group_line(posts_dir):
    import json
    markdown_files = list(posts_dir.glob('*.md'))
    markdown_files = [f for f in markdown_files if f.name != 'index.md']
    page_title = posts_dir.name
    follower_count = ''
    summary_path = posts_dir / 'latest_fetch_summary.json'
    if summary_path.exists():
        try:
            summary = json.loads(summary_path.read_text(encoding='utf-8'))
            follower_count = summary.get('page', {}).get('follower_count') or ''
        except Exception:
            pass
    from urllib import parse
    index_path = parse.quote((posts_dir / 'index.md').as_posix(), safe='/')
    count_str = f' (已收錄: {len(markdown_files)})'
    follower_str = f' - {follower_count}' if follower_count else ''
    return f'### [{page_title}]({index_path}){count_str}{follower_str}'

group_dirs = sorted(p for p in data_dir.iterdir() if p.is_dir() and (p / 'index.md').exists())
cst_time = datetime.now(timezone(timedelta(hours=8)))
now_str = cst_time.strftime('%Y-%m-%d %H:%M') + ' CST'

lines = ['## 自動更新清單', '', f'Updated: {now_str}', '']
for d in group_dirs:
    lines.append(build_group_line(d))
    lines.append('')
generated = '\n'.join(lines)

readme_path = Path('README.md')
text = readme_path.read_text(encoding='utf-8')
start_marker = '<!-- AUTO-GENERATED:POSTS START -->'
end_marker = '<!-- AUTO-GENERATED:POSTS END -->'
replacement = f'{start_marker}\n{generated}\n{end_marker}'
pattern = re.compile(rf'{re.escape(start_marker)}.*?{re.escape(end_marker)}', re.DOTALL)
text = pattern.sub(replacement, text)
readme_path.write_text(text, encoding='utf-8')
print(f'README updated: {now_str}')
"

      - name: Update fetch CSV
        run: python3 scripts/update_fetch_csv.py

      - name: Detect new posts
        id: detect
        run: |
          # Sum up new_post_count from all summary files
          total_new=$(python3 -c "import json, glob; print(sum(json.load(open(f, encoding='utf-8')).get('new_post_count', 0) for f in glob.glob('data/*/latest_fetch_summary.json')))")
          echo "Total new posts: $total_new"
          echo "new_post_count=$total_new" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md raw_facebook_fetch.csv
          # Stage post data only if there are new posts
          if [ "${{ steps.detect.outputs.new_post_count }}" != "0" ]; then
            git add data/
          fi
          if ! git diff --cached --quiet; then
            if [ "${{ steps.detect.outputs.new_post_count }}" != "0" ]; then
              git commit -m "Daily fetch: added $count new posts" -m "Automated fetch from Facebook pages."
            else
              git commit -m "chore: update README timestamp [skip ci]"
            fi
            git push origin HEAD:main
          fi
        env:
          count: ${{ steps.detect.outputs.new_post_count }}
