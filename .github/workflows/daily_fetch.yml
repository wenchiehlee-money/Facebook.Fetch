name: Daily Facebook Fetch

on:
  workflow_dispatch:
  schedule:
    - cron: '10 1 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Reset new post counts
        run: |
          # Reset new_post_count to 0 in all summary files to avoid false positives from previous commits
          python3 -c "import json, glob; [json.dump({**json.load(open(f, encoding='utf-8')), 'new_post_count': 0}, open(f, 'w', encoding='utf-8'), ensure_ascii=False, indent=2) for f in glob.glob('data/*/latest_fetch_summary.json')]"

      - name: Run daily fetch
        env:
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
        run: |
          # Use an array of URLs to fetch multiple pages
          urls=(
            "https://www.facebook.com/dextermchang"
            "https://www.facebook.com/yutinghaosfinance"
            "https://www.facebook.com/MarketingDataScienceTMR"
            "https://www.facebook.com/FinGuider"
            "https://www.facebook.com/GreenHornFans"
          )
          for url in "${urls[@]}"; do
            echo "::group::Fetching $url"
            # We pass the cookie secret; if not set, it will be empty string which the script handles.
            # Use '|| true' or handle error to ensure one failure doesn't stop the whole process.
            python3 fetch_facebook_posts.py "$url" --count 20 --cookie "$FB_COOKIE" || echo "Warning: Failed to fetch $url"
            echo "::endgroup::"
          done

      - name: Detect new posts
        id: detect
        run: |
          # Sum up new_post_count from all summary files
          total_new=$(python3 -c "import json, glob; print(sum(json.load(open(f, encoding='utf-8')).get('new_post_count', 0) for f in glob.glob('data/*/latest_fetch_summary.json')))")
          echo "Total new posts: $total_new"
          echo "new_post_count=$total_new" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.detect.outputs.new_post_count != '0'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Daily fetch: added $count new posts" -m "Automated fetch from Facebook pages."
          git push origin HEAD:main
        env:
          count: ${{ steps.detect.outputs.new_post_count }}
